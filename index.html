<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OverCoffee — Agent Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#FFF;--s2:#F0EEE9;--border:#E2DED7;--bstrong:#C8C3BA;
  --text:#1A1916;--muted:#6B6760;--faint:#9E9A94;
  --accent:#2E5BFF;--abg:#EBF0FF;
  --green:#1A7A4A;--gbg:#E6F4ED;
  --amber:#A05E00;--ambg:#FEF3E2;
  --red:#C0392B;--rbg:#FDECEA;
  --purple:#5B3FBF;--pbg:#EDE9FF;
  --teal:#0F6E56;--tbg:#E1F4EE;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:8px;--rl:12px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.shell{display:flex;height:100vh;overflow:hidden}
.sb{width:252px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-hd{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.sb-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.sb-sec{padding:12px 16px 6px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.fb{display:flex;align-items:center;gap:8px;width:100%;padding:6px 16px;background:none;border:none;cursor:pointer;font-family:var(--font);font-size:13px;color:var(--muted);text-align:left;transition:background .1s}
.fb:hover{background:var(--s2)}.fb.active{background:var(--abg);color:var(--accent);font-weight:500}
.fb .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fb .ct{margin-left:auto;font-size:11px;background:var(--s2);color:var(--faint);padding:1px 6px;border-radius:10px}
.fb.active .ct{background:var(--abg);color:var(--accent)}
.sb-stats{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border)}
.sr{display:flex;justify-content:space-between;padding:3px 0}
.sl{font-size:12px;color:var(--muted)}.sv{font-size:12px;font-weight:600}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;flex:1}
.sw{position:relative}
.sw input{padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:var(--r);background:var(--s2);font-family:var(--font);font-size:13px;color:var(--text);width:190px;outline:none}
.sw input:focus{border-color:var(--accent);background:#fff}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:12px;pointer-events:none}
.sync-btn{padding:7px 12px;border-radius:var(--r);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--muted);white-space:nowrap}
.sync-btn:disabled{opacity:.5;cursor:not-allowed}
.run-all-btn{padding:7px 13px;border-radius:var(--r);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;background:var(--accent);color:#fff;white-space:nowrap;display:flex;align-items:center;gap:6px}
.run-all-btn:hover{opacity:.88}.run-all-btn:disabled{opacity:.45;cursor:not-allowed}
.content{flex:1;overflow-y:auto;padding:20px}
.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--muted)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background .3s}
.sdot.live{background:var(--green);animation:pulse 2s infinite}
.sdot.loading{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-bar a{font-size:11px;color:var(--faint);text-decoration:none;margin-left:auto}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}
.sec-count{font-size:12px;color:var(--muted)}
.task-grid{display:flex;flex-direction:column;gap:9px}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color .15s,box-shadow .15s}
.task-card:hover{border-color:var(--bstrong);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.task-card.running{border-color:var(--accent)}
.task-card.done{opacity:.72;border-color:var(--gbg)}
.card-hd{display:flex;align-items:flex-start;gap:10px;padding:13px 14px 10px}
.card-meta{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.35}
.card-tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap}
.tc-TCC{background:var(--pbg);color:var(--purple)}
.tc-HS{background:var(--tbg);color:var(--teal)}
.tc-GT4{background:var(--ambg);color:var(--amber)}
.tc-Cody{background:var(--gbg);color:var(--green)}
.tc-default{background:var(--s2);color:var(--muted)}
.tt-SEO{background:#E6F4FF;color:#1A5FAB}
.tt-EMAIL{background:#FFF0F6;color:#8B225A}
.tt-CONTENT{background:var(--gbg);color:var(--green)}
.tt-OPS{background:var(--s2);color:var(--muted)}
.tt-PAID{background:var(--ambg);color:var(--amber)}
.tp-High{background:var(--rbg);color:var(--red)}
.tp-Medium{background:var(--ambg);color:var(--amber)}
.tp-Low{background:var(--s2);color:var(--muted)}
.ts-done{background:var(--gbg);color:var(--green)}
.ts-prog{background:var(--abg);color:var(--accent)}
.card-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.card-week{font-size:11px;color:var(--faint);white-space:nowrap}
.notion-link{font-size:11px;color:var(--faint);text-decoration:none}
.notion-link:hover{color:var(--accent)}
.run-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border:none;background:var(--accent);color:#fff;border-radius:var(--r);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.run-btn:hover{opacity:.85}.run-btn:disabled{opacity:.38;cursor:not-allowed}
.done-badge{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:var(--green)}
.card-summary{padding:0 14px 12px;font-size:13px;color:var(--muted);line-height:1.55}
.prog-wrap{height:2px;background:var(--border);margin:0 14px;border-radius:2px;overflow:hidden;display:none}
.prog-wrap.on{display:block}
.prog-bar{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .4s ease}
.out-panel{margin:10px 14px 13px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:none}
.out-panel.on{display:block}
.out-hd{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--border);font-size:12px;font-weight:500;color:var(--muted)}
.out-hd .badge{margin-left:auto;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;background:var(--gbg);color:var(--green);padding:2px 7px;border-radius:4px}
.out-body{padding:14px;font-size:13px;line-height:1.7;color:var(--text);max-height:460px;overflow-y:auto}
.out-body h2{font-size:14px;font-weight:600;margin:14px 0 6px}
.out-body h3{font-size:13px;font-weight:600;margin:12px 0 5px}
.out-body p{margin-bottom:9px}
.out-body ul,.out-body ol{padding-left:20px;margin-bottom:9px}
.out-body li{margin-bottom:4px}
.out-body strong{font-weight:600}
.out-body hr{border:none;border-top:1px solid var(--border);margin:12px 0}

/* Action bar below output */
.out-actions{display:flex;gap:8px;padding:9px 12px;border-top:1px solid var(--border);background:var(--s2);flex-wrap:wrap;align-items:center}
.act-btn{padding:6px 12px;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .12s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.act-btn:hover{border-color:var(--bstrong);color:var(--text)}
.act-btn.primary{border-color:var(--accent);background:var(--abg);color:var(--accent)}
.act-btn.primary:hover{background:var(--accent);color:#fff}
.act-btn.success{border-color:var(--green);background:var(--gbg);color:var(--green)}
.act-btn.success:hover{background:var(--green);color:#fff}
.act-btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* Project badge on Claude button */
.project-badge{font-size:10px;background:rgba(255,255,255,.25);padding:1px 5px;border-radius:3px;margin-left:2px}

.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spin.dark{border:2px solid var(--border);border-top-color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{padding:10px 14px;background:var(--rbg);color:var(--red);font-size:12px;border-top:1px solid #f0c0bb}
.center-msg{text-align:center;padding:60px 20px;color:var(--muted)}
.center-msg h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
</style>
</head>
<body>
<div class="shell">

<aside class="sb">
  <div class="sb-hd">
    <div class="sb-logo">OverCoffee</div>
    <div class="sb-title">Agent Dashboard</div>
  </div>
  <div class="sb-sec">Client</div>
  <button class="fb active" onclick="setClient('all',this)"><span class="dot" style="background:#888"></span>All clients<span class="ct" id="ct-all">—</span></button>
  <button class="fb" onclick="setClient('TCC',this)"><span class="dot" style="background:#5B3FBF"></span>Texas Cannabis Clinic<span class="ct" id="ct-TCC">—</span></button>
  <button class="fb" onclick="setClient('H&S',this)"><span class="dot" style="background:#0F6E56"></span>Horse + Bow<span class="ct" id="ct-HS">—</span></button>
  <button class="fb" onclick="setClient('GT4',this)"><span class="dot" style="background:#A05E00"></span>GT4<span class="ct" id="ct-GT4">—</span></button>
  <button class="fb" onclick="setClient('Cody',this)"><span class="dot" style="background:#1A7A4A"></span>Cody Young<span class="ct" id="ct-Cody">—</span></button>
  <div class="sb-sec" style="margin-top:6px">Task type</div>
  <button class="fb" onclick="setType('SEO',this)"><span class="dot" style="background:#1A5FAB"></span>SEO</button>
  <button class="fb" onclick="setType('CONTENT',this)"><span class="dot" style="background:#1A7A4A"></span>Content</button>
  <button class="fb" onclick="setType('EMAIL',this)"><span class="dot" style="background:#8B225A"></span>Email</button>
  <button class="fb" onclick="setType('PAID',this)"><span class="dot" style="background:#A05E00"></span>Paid</button>
  <div class="sb-stats">
    <div class="sr"><span class="sl">In queue</span><span class="sv" id="st-q">—</span></div>
    <div class="sr"><span class="sl">Running now</span><span class="sv" id="st-run" style="color:var(--accent)">0</span></div>
    <div class="sr"><span class="sl">Done this session</span><span class="sv" id="st-done" style="color:var(--green)">0</span></div>
    <div class="sr"><span class="sl">Last synced</span><span class="sv" id="st-sync" style="color:var(--faint);font-weight:400">—</span></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="tb-title" id="view-title">All tasks</div>
    <div class="sw"><span class="si">🔍</span><input type="text" id="search" placeholder="Search tasks…" oninput="render()"></div>
    <button class="sync-btn" id="sync-btn" onclick="syncNotion()">↻ Sync Notion</button>
    <button class="run-all-btn" id="run-all-btn" onclick="runAllHigh()">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="white"><path d="M2 1.5l7 4-7 4z"/></svg>
      Run all high-priority
    </button>
  </div>

  <div class="content">
    <div class="status-bar">
      <div class="sdot live" id="sdot"></div>
      <span id="stext">Loading tasks…</span>
      <a href="https://app.notion.com/p/437767d36c1640b19abbbb6a2523bf5f" target="_blank">↗ Open Notion</a>
    </div>
    <div class="sec-hd">
      <span class="sec-label">Open tasks</span>
      <span class="sec-count" id="sec-count"></span>
    </div>
    <div class="task-grid" id="grid">
      <div class="center-msg"><h3>Loading…</h3></div>
    </div>
  </div>
</div>
</div>

<script>
// ── CLIENT → CLAUDE PROJECT MAPPING ─────────────────────────────────────────
const CLIENT_PROJECTS = {
  "TCC":       { id: "019d7d60-d2df-719a-aea4-93eb0d506f52", label: "TCC Project" },
  "H&S":       { id: "019dacb8-233d-742d-8d0d-62e04d9db806", label: "Horse + Bow" },
  "GT4":       { id: "019e7937-ccd1-76f8-a3d0-e9a46d33bead", label: "GT4 Project" },
  "Cody":      { id: "019dacc9-0f9d-7096-b3aa-4573e4772658", label: "Cody Project" },
  "Heart":     { id: "019d8840-8397-75a8-8d9f-9775c93e65e4", label: "Heart & Soul" },
  "Tutte":     { id: "019dfe3f-8f27-7325-9fd4-cac4b9058ed7", label: "Tutte al Forno" },
  "Rachel":    { id: "019dacb1-586b-77ec-869a-70bd25cae2ba", label: "Rachel Jackson" },
  "Cafe":      { id: "019dacaa-d1fc-76eb-afc7-4cbe1fa493f5", label: "Cafe Primavera" },
  "PSRT":      { id: "019d9bf8-83de-7358-b95d-70b9c2e8c302", label: "PSRT" },
  "Barworks":  { id: "019d9bec-e197-729b-adf8-98a6ae98b58c", label: "Barworks" },
  "Continental":{ id: "019d884f-c64f-7044-9429-52b9b92c443c", label: "Continental" },
  "Feast":     { id: "019d883b-230c-7697-8e97-b0894aa59f64", label: "Feast for a King" },
  "OCC":       { id: "019dad45-4ac5-7394-8761-30d68683ee01", label: "Agency Master" },
};
const DEFAULT_PROJECT = { id: "019dad45-4ac5-7394-8761-30d68683ee01", label: "Agency Master" };

function getProject(clientKey) {
  return CLIENT_PROJECTS[clientKey] || DEFAULT_PROJECT;
}

function claudeURL(task, outputText) {
  const proj = getProject(task.client);
  const msg = outputText
    ? `Here's the agent output for "${task.name}" — let's refine it:\n\n${outputText.slice(0, 1800)}`
    : `I need help with this task: ${task.name}\n\nContext: ${task.summary}`;
  return `https://claude.ai/project/${proj.id}?q=${encodeURIComponent(msg)}`;
}

// ── CONFIG ───────────────────────────────────────────────────────────────────
const NOTION_MCP = "https://mcp.notion.com/mcp";
const NOTION_DS  = "collection://92fdc628-cd81-41c5-a510-16c799e0de78";
const AGENT_URL  = "/.netlify/functions/agent";

// ── STATE ────────────────────────────────────────────────────────────────────
let tasks   = [];
let running = new Set();
let done    = new Set();
let outputs = {};
let errors  = {};
let clientF = 'all';
let typeF   = null;

// ── NOTION SYNC ───────────────────────────────────────────────────────────────
async function syncNotion() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '↻ Syncing…';
  btn.disabled = true;
  setStatus('loading', 'Syncing with Notion…');
  try {
    const res = await fetch("/.netlify/functions/sync", {
      method: "POST",
      headers: { "Content-Type": "application/json" }
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    if (Array.isArray(data.tasks) && data.tasks.length > 0) {
      tasks = data.tasks.map(t => ({
        ...t,
        type:     t.type     || 'OPS',
        priority: t.priority || 'Medium',
        status:   t.status   || 'Not started'
      }));
      const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('st-sync').textContent = now;
      setStatus('live', `${tasks.length} tasks synced from Notion`);
      render();
      btn.textContent = '↻ Sync Notion';
      btn.disabled = false;
      return;
    }
    throw new Error('No tasks returned from Notion');
  } catch(err) {
    setStatus('live', `Sync failed: ${err.message} — showing embedded tasks`);
    loadFallback();
    render();
    document.getElementById('st-sync').textContent = 'embedded';
  }
  btn.textContent = '↻ Sync Notion';
  btn.disabled = false;
}

function loadFallback() {
  tasks = [
    {id:"t1",name:"Write PTSD email campaign (3 emails)",client:"TCC",type:"EMAIL",priority:"High",status:"Not started",week:"Week 2",due:"2026-06-14",url:"https://app.notion.com/p/375cc25612f281459449f76f07e383c4",summary:"3-email PTSD drip. Email 1: Does PTSD qualify? Email 2: What to expect at TCC. Email 3: Patient story + CTA.",notes:"Build in Salesforce as drafts for review."},
    {id:"t2",name:"Diagnose organic position decline (7.0 → 9.8)",client:"TCC",type:"SEO",priority:"High",status:"In progress",week:"Week 1",due:"2026-06-07",url:"https://app.notion.com/p/375cc25612f2814bacd7c18c9732fef0",summary:"GSC diagnostic complete. Broad site decline consistent with May 2026 spam update. Delta-8 cluster dragging authority.",notes:"Fort Worth improved 6.83→4.54."},
    {id:"t3",name:"Begin topical map + content creation",client:"GT4",type:"CONTENT",priority:"High",status:"Not started",week:"Week 2",due:"2026-06-14",url:"https://app.notion.com/p/375cc25612f281738cf9d6135422ef27",summary:"Start building topical authority map. 5–10 priority topics, assign to production queue.",notes:""},
    {id:"t4",name:"Migrate PTSD email to HTML format",client:"TCC",type:"EMAIL",priority:"High",status:"Not started",week:"Week 2",due:"2026-06-14",url:"https://app.notion.com/p/375cc25612f2818182baf5a4bf825c3d",summary:"PTSD opt-out 4.81% vs Chronic Pain 0.40%. Build HTML version matching Chronic Pain template.",notes:"Fix 183% open rate anomaly in Salesforce."},
    {id:"t5",name:"Send June event reminder email",client:"H&S",type:"EMAIL",priority:"High",status:"Not started",week:"Week 3",due:"2026-06-16",url:"https://app.notion.com/p/375cc25612f2814b9566d7727591a765",summary:"1 week before event. One button, urgency copy.",notes:""},
    {id:"t6",name:"Expand /idpc/ Direct Primary Care page",client:"H&S",type:"CONTENT",priority:"High",status:"Not started",week:"Week 3",due:"2026-06-21",url:"https://app.notion.com/p/375cc25612f281418622c890e50497ff",summary:"/idpc/ has 41.9s avg engagement time. Add: who it's for, what's included, cost, FAQ.",notes:"Add Schedule a Call CTA above fold and at bottom."},
    {id:"t7",name:"Rewrite Liberty Hill title tag + meta",client:"TCC",type:"SEO",priority:"High",status:"Not started",week:"Week 3",due:"2026-06-21",url:"https://app.notion.com/p/375cc25612f2819e9062defaa817c06b",summary:"Liberty Hill city page needs updated title tag and meta to improve CTR.",notes:""},
    {id:"t8",name:"Build Austin city landing page",client:"TCC",type:"CONTENT",priority:"Medium",status:"Not started",week:"Week 4",due:"2026-06-28",url:"https://app.notion.com/p/375cc25612f2810c83dac84229d141be",summary:"Model after Houston/San Antonio. Add FAQ targeting local queries.",notes:""},
    {id:"t9",name:"Build Fort Worth city landing page",client:"TCC",type:"CONTENT",priority:"High",status:"Done",week:"Week 2",due:"2026-06-14",url:"https://app.notion.com/p/375cc25612f2811ebb76d7a6e975fca3",summary:"Fort Worth: 27.8% conversion rate, no dedicated page.",notes:""}
  ];
}

// ── AGENT RUNNER ──────────────────────────────────────────────────────────────
async function runTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || running.has(id)) return;
  running.add(id);
  delete errors[id];
  render();
  const pb = document.getElementById(`pb-${id}`);
  let pct = 0;
  const iv = setInterval(() => { pct = Math.min(pct + Math.random()*3, 88); if(pb) pb.style.width = pct+'%'; }, 500);
  try {
    const res = await fetch(AGENT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(task)
    });
    clearInterval(iv);
    if (pb) pb.style.width = '100%';
    const data = await res.json();
    if (!res.ok || data.error) { errors[id] = data.error || `HTTP ${res.status}`; }
    else { outputs[id] = fmt(data.output); done.add(id); }
  } catch(err) {
    clearInterval(iv);
    if (pb) pb.style.width = '100%';
    errors[id] = err.message;
  }
  running.delete(id);
  render();
}

async function runAllHigh() {
  const btn = document.getElementById('run-all-btn');
  btn.disabled = true;
  const ready = tasks.filter(t => t.priority==='High' && t.status!=='Done' && !done.has(t.id) && !running.has(t.id));
  for (const t of ready) { runTask(t.id); await new Promise(r => setTimeout(r, 700)); }
  setTimeout(() => { btn.disabled = false; }, 3000);
}

// ── SAVE TO NOTION ────────────────────────────────────────────────────────────
async function saveToNotion(id) {
  const task = tasks.find(t => t.id === id);
  const rawText = document.getElementById(`out-body-${id}`)?.innerText || '';
  if (!task || !rawText) return;
  const btn = document.getElementById(`save-btn-${id}`);
  btn.textContent = 'Saving…';
  btn.disabled = true;
  try {
    await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 300,
        system: "Update Notion page via MCP. Insert content and mark Status Done. Reply only 'Saved.'",
        mcp_servers: [{ type: "url", url: NOTION_MCP, name: "notion" }],
        messages: [{ role: "user", content: `Update ${task.url}: insert this content and set Status=Done:\n\n${rawText}` }]
      })
    });
    btn.textContent = '✓ Saved';
    btn.className = 'act-btn success';
  } catch {
    btn.textContent = 'Save failed';
    btn.disabled = false;
  }
}

function copyOutput(id) {
  const text = document.getElementById(`out-body-${id}`)?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`copy-btn-${id}`);
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = 'Copy output', 1800); }
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  const dot = document.getElementById('sdot');
  dot.className = 'sdot' + (state==='live' ? ' live' : state==='loading' ? ' loading' : '');
  document.getElementById('stext').textContent = msg;
}

function updateCounts() {
  const open = tasks.filter(t => t.status!=='Done' && !done.has(t.id));
  document.getElementById('ct-all').textContent = open.length;
  [['TCC','TCC'],['H&S','HS'],['GT4','GT4'],['Cody','Cody']].forEach(([c,k]) => {
    const el = document.getElementById('ct-'+k);
    if (el) el.textContent = open.filter(t => t.client===c).length;
  });
  document.getElementById('st-q').textContent = open.length;
  document.getElementById('st-run').textContent = running.size;
  document.getElementById('st-done').textContent = done.size;
}

function visible() {
  const q = document.getElementById('search').value.toLowerCase();
  return tasks.filter(t => {
    const cm = clientF==='all' || t.client===clientF;
    const tm = !typeF || t.type===typeF;
    const sm = !q || t.name.toLowerCase().includes(q) || (t.summary||'').toLowerCase().includes(q);
    return cm && tm && sm;
  });
}

function card(t) {
  const isDone    = t.status==='Done' || done.has(t.id);
  const isRunning = running.has(t.id);
  const hasOut    = outputs[t.id];
  const hasErr    = errors[t.id];
  const ck        = t.client.replace('&','');
  const proj      = getProject(t.client);

  const action = isDone
    ? `<span class="done-badge">✓ Done</span>`
    : isRunning
    ? `<button class="run-btn" disabled><div class="spin"></div> Running…</button>`
    : `<button class="run-btn" onclick="runTask('${t.id}')">▶ Run</button>`;

  const prog = `<div class="prog-wrap${isRunning?' on':''}" id="prog-${t.id}"><div class="prog-bar" id="pb-${t.id}"></div></div>`;

  let outSection = '';
  if (hasOut) {
    const rawText = hasOut.replace(/<[^>]+>/g,'');
    const openURL = claudeURL(t, rawText);
    outSection = `
    <div class="out-panel on" id="panel-${t.id}">
      <div class="out-hd">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="6" stroke="var(--green)" stroke-width="1.2"/><path d="M4 6.5l2 2 3-3" stroke="var(--green)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Agent output
        <span class="badge">Ready</span>
      </div>
      <div class="out-body" id="out-body-${t.id}">${hasOut}</div>
      <div class="out-actions">
        <button class="act-btn" id="copy-btn-${t.id}" onclick="copyOutput('${t.id}')">Copy output</button>
        <button class="act-btn success" id="save-btn-${t.id}" onclick="saveToNotion('${t.id}')">Save to Notion ↗</button>
        <a class="act-btn primary" href="${openURL}" target="_blank">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor"><path d="M2 1.5l7 4-7 4z"/></svg>
          Refine in Claude
          <span class="project-badge">${proj.label}</span>
        </a>
      </div>
    </div>`;
  } else if (hasErr) {
    const openURL = claudeURL(t, null);
    outSection = `
    <div class="err-msg" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <span>⚠ ${hasErr}</span>
      <a class="act-btn primary" href="${openURL}" target="_blank" style="flex-shrink:0">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor"><path d="M2 1.5l7 4-7 4z"/></svg>
        Run in Claude instead
        <span style="font-size:10px;opacity:.7;margin-left:2px">${proj.label}</span>
      </a>
    </div>`;
  } else if (isRunning) {
    outSection = `
    <div class="out-panel on">
      <div class="out-hd"><div class="spin dark"></div> Agent working…<span style="margin-left:auto;font-size:11px;color:var(--faint)">${t.type} · ${t.client}</span></div>
    </div>`;
  }

  return `
  <div class="task-card${isDone?' done':''}${isRunning?' running':''}" id="card-${t.id}">
    <div class="card-hd">
      <div class="card-meta">
        <div class="card-title">${t.name}</div>
        <div class="card-tags">
          <span class="tag tc-${ck}">${t.client}</span>
          <span class="tag tt-${t.type}">${t.type}</span>
          <span class="tag tp-${t.priority}">${t.priority}</span>
          ${isDone ? '<span class="tag ts-done">Done</span>' : ''}
          ${t.status==='In progress'&&!isDone ? '<span class="tag ts-prog">In progress</span>' : ''}
          ${t.due ? `<span style="font-size:11px;color:var(--faint)">Due ${t.due}</span>` : ''}
        </div>
      </div>
      <div class="card-right">
        <span class="card-week">${t.week||''}</span>
        <a class="notion-link" href="${t.url}" target="_blank">↗ Notion</a>
        ${action}
      </div>
    </div>
    ${t.summary ? `<div class="card-summary">${t.summary}${t.notes?' '+t.notes:''}</div>` : ''}
    ${prog}
    ${outSection}
  </div>`;
}

function render() {
  const vis = visible();
  const open = vis.filter(t => t.status!=='Done' && !done.has(t.id));
  const closed = vis.filter(t => t.status==='Done' || done.has(t.id));
  const sorted = [
    ...open.sort((a,b) => ({High:0,Medium:1,Low:2}[a.priority]||1) - ({High:0,Medium:1,Low:2}[b.priority]||1)),
    ...closed
  ];
  document.getElementById('sec-count').textContent = `${open.length} open · ${closed.length} done`;
  updateCounts();
  const grid = document.getElementById('grid');
  if (!sorted.length) {
    grid.innerHTML = `<div class="center-msg"><h3>No tasks</h3><p>Try a different filter or sync Notion.</p></div>`;
    return;
  }
  grid.innerHTML = sorted.map(card).join('');
}

function setClient(c, btn) {
  clientF=c; typeF=null;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const L={all:'All tasks',TCC:'Texas Cannabis Clinic','H&S':'Horse + Bow',GT4:'GT4',Cody:'Cody Young'};
  document.getElementById('view-title').textContent = L[c]||c;
  render();
}
function setType(tp, btn) {
  if (typeF===tp) {
    typeF=null; clientF='all';
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.fb')[0].classList.add('active');
    document.getElementById('view-title').textContent = 'All tasks';
  } else {
    typeF=tp; clientF='all';
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-title').textContent = tp+' tasks';
  }
  render();
}

function fmt(raw) {
  return raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)(?!<li>)/g,'<ul>$1</ul>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\n\n+/g,'</p><p>')
    .replace(/^(?!<[hup]|<hr)(.+)$/gm,'<p>$1</p>')
    .replace(/<p><\/p>/g,'')
    .replace(/<p>(<h[23])/g,'$1')
    .replace(/(<\/h[23]>)<\/p>/g,'$1')
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
}

loadFallback();
render();
setStatus('live', `${tasks.length} tasks loaded — click Sync Notion for live data`);
document.getElementById('st-sync').textContent = 'embedded';
</script>
